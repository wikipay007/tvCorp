<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Corporativa</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background-color: #000; 
            overflow: hidden; 
            font-family: sans-serif; 
        }
        
        #start-screen { 
            display: flex; 
            width: 100vw; 
            height: 100vh; 
            justify-content: center; 
            align-items: center; 
            background-color: #121212; 
            z-index: 100;
            position: absolute;
        }
        
        button { 
            padding: 20px 40px; 
            font-size: 24px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.3s; 
        }
        
        button:hover { background-color: #218838; }
        
        #tv-display { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
        }

        #media-container {
            width: 100%; 
            height: 100%; 
            position: relative;
        }

        /* Transição Suave (Crossfade) */
        .media-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 2s ease-in-out; 
        }

        .media-item.active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button onclick="iniciarTV()">▶ Iniciar TV Corporativa</button>
    </div>

    <div id="tv-display">
        <div id="media-container"></div>
    </div>

    <script>
        // =========================================================
        // ⚙️ SUA PLAYLIST COM AGENDAMENTO (PADRÃO BRASILEIRO)
        // Formato: 'DD/MM/AAAA HH:MM:SS' 
        // =========================================================
        const playlist = [
            { 
                tipo: 'image',
                url: 'https://dblpl.s3.us-east-1.amazonaws.com/TV-Corporativa/Aviso+Sala+Reuni%C3%A3o.png', 
                duracao: 15,
                // Exemplo prático de formatação BR
                dataInicio: '20/05/2026 08:00:00', 
                dataFim: '30/07/2026 18:30:00'
            },
            { 
                tipo: 'video', 
                url: 'https://dblpl.s3.us-east-1.amazonaws.com/TV-Corporativa/RH+-+V%C3%ADdeo++(2).mp4', 
                duracao: 175 
                // Sem data = Roda sempre
            },
            { 
                tipo: 'video', 
                url: 'https://dblpl.s3.us-east-1.amazonaws.com/TV-Corporativa/Semana+SIPAT-3.mp4', 
                duracao: 15
                // Sem data = Roda sempre
            }
        ];

        let indexAtual = -1; 
        let timerLoop;
        let timerFadeOut;

        function iniciarTV() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('tv-display').style.display = 'block';

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            }

            tocarProximo(); 
        }

        // Função que traduz a data BR "DD/MM/AAAA HH:MM:SS" para o sistema entender
        function converterDataBR(dataStr) {
            if (!dataStr) return null;
            
            const partes = dataStr.split(' ');
            const dataPartes = partes[0].split('/');
            const horaPartes = partes[1] ? partes[1].split(':') : ['00', '00', '00'];
            
            const dia = parseInt(dataPartes[0], 10);
            const mes = parseInt(dataPartes[1], 10) - 1; // Mês no Javascript começa no zero
            const ano = parseInt(dataPartes[2], 10);
            
            const hora = parseInt(horaPartes[0], 10);
            const minuto = parseInt(horaPartes[1], 10);
            const segundo = horaPartes[2] ? parseInt(horaPartes[2], 10) : 0;
            
            return new Date(ano, mes, dia, hora, minuto, segundo);
        }

        function obterProximoIndiceValido(atual) {
            const agora = new Date();
            
            for (let i = 1; i <= playlist.length; i++) {
                let indexVerificado = (atual + i) % playlist.length;
                let media = playlist[indexVerificado];
                let valido = true;

                if (media.dataInicio) {
                    const limiteInicio = converterDataBR(media.dataInicio);
                    if (limiteInicio > agora) valido = false; 
                }
                
                if (media.dataFim) {
                    const limiteFim = converterDataBR(media.dataFim);
                    if (limiteFim < agora) valido = false; 
                }

                if (valido) {
                    return indexVerificado;
                }
            }
            return -1; 
        }

        function tocarProximo() {
            const proximoIndex = obterProximoIndiceValido(indexAtual);

            if (proximoIndex === -1) {
                const container = document.getElementById('media-container');
                const elementosAntigos = container.querySelectorAll('.media-item');
                elementosAntigos.forEach(el => el.classList.remove('active'));
                
                clearTimeout(timerLoop);
                timerLoop = setTimeout(tocarProximo, 5000);
                return;
            }

            indexAtual = proximoIndex;
            const mediaAtual = playlist[indexAtual];
            const elementoAtual = renderizarMedia(indexAtual);

            clearTimeout(timerLoop);
            timerLoop = setTimeout(() => {
                tocarProximo();
            }, mediaAtual.duracao * 1000);

            clearTimeout(timerFadeOut);
            const tempoParaFadeOut = (mediaAtual.duracao - 3) * 1000;
            
            if (tempoParaFadeOut > 0) {
                timerFadeOut = setTimeout(() => {
                    if (elementoAtual) {
                        elementoAtual.classList.remove('active');
                    }
                }, tempoParaFadeOut);
            }
        }

        function renderizarMedia(index) {
            const container = document.getElementById('media-container');
            const media = playlist[index];
            
            let novoElemento;

            if (media.tipo === 'image') {
                novoElemento = document.createElement('img');
                novoElemento.src = media.url;
            } else if (media.tipo === 'video') {
                novoElemento = document.createElement('video');
                novoElemento.src = media.url;
                novoElemento.autoplay = true;
                novoElemento.muted = true; 
                novoElemento.loop = true;
            }

            novoElemento.className = 'media-item';
            container.appendChild(novoElemento);

            novoElemento.offsetWidth; 

            novoElemento.classList.add('active');

            const elementosAntigos = container.querySelectorAll('.media-item:not(:last-child)');
            elementosAntigos.forEach(el => {
                setTimeout(() => {
                    el.remove();
                }, 2000);
            });

            return novoElemento;
        }
    </script>
</body>
</html>
